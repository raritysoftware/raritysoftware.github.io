# Site settings
title: "Rarity Software"
description: "Geleceğin yazılımlarını bugün yaratıyoruz. İnovatif teknolojiler kullanarak işletmenizin dijital dönüşümünü gerçekleştiriyoruz."
baseurl: ""
url: "https://raritysoftware.github.io"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO settings
author: "Rarity Software"
twitter:
  username: raritysoftware
  card: summary_large_image
facebook:
  app_id: 
  publisher: 
  admins: 

# Social media
github_username: raritysoftware
linkedin_username: raritysoftware

# Additional settings
timezone: Europe/Istanbul
lang: tr

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
